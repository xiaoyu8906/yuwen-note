<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>语文笔记生成器·AI智能版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .tip {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #4f46e5;
        }
        button:disabled {
            background: #a5a6f0;
            cursor: not-allowed;
        }
        .error {
            color: #ef4444;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        .success {
            color: #10b981;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        .config-panel {
            display: none;
            margin-bottom: 20px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
        }
        .config-panel.show {
            display: block;
        }
        .config-btn {
            text-align: center;
            color: #6366f1;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>语文笔记生成器·AI智能版</h1>
        
        <div class="config-btn" id="configBtn">⚙️ 配置GitHub信息</div>
        
        <div class="config-panel" id="configPanel">
            <div class="form-group">
                <label>GitHub用户名</label>
                <input type="text" id="githubUsername" placeholder="你的GitHub用户名">
            </div>
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="githubToken" placeholder="你的classic Token">
                <div class="tip">只需要repo权限的classic Token，不会传到公开服务器</div>
            </div>
            <button id="saveConfigBtn">保存配置</button>
        </div>

        <div class="form-group">
            <label>课文名称</label>
            <input type="text" id="lessonName" placeholder="比如：海底世界">
        </div>
        <div class="form-group">
            <label>课文链接（可选，自动搜索失败时填）</label>
            <input type="text" id="lessonUrl" placeholder="https://hanchacha.com/yuwen/xxx.html">
            <div class="tip">如果自动搜索不到，可以手动去hanchacha复制课文页面链接</div>
        </div>

        <button id="generateBtn">生成笔记</button>
        
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg">触发成功！正在云端生成笔记，请到Actions页面查看进度~</div>
    </div>

    <script>
        const REPO_NAME = "yuwen-note";
        
        // 加载本地配置
        let config = JSON.parse(localStorage.getItem('yuwenNoteConfig') || '{}');
        const usernameInput = document.getElementById('githubUsername');
        const tokenInput = document.getElementById('githubToken');
        const configBtn = document.getElementById('configBtn');
        const configPanel = document.getElementById('configPanel');
        const saveConfigBtn = document.getElementById('saveConfigBtn');
        const lessonNameInput = document.getElementById('lessonName');
        const lessonUrlInput = document.getElementById('lessonUrl');
        const generateBtn = document.getElementById('generateBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // 初始化配置
        if (config.username && config.token) {
            usernameInput.value = config.username;
            tokenInput.value = config.token;
        }

        // 配置面板切换
        configBtn.addEventListener('click', () => {
            configPanel.classList.toggle('show');
        });

        // 保存配置
        saveConfigBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const token = tokenInput.value.trim();
            if (!username || !token) {
                alert('请填写完整的配置信息');
                return;
            }
            config = { username, token };
            localStorage.setItem('yuwenNoteConfig', JSON.stringify(config));
            configPanel.classList.remove('show');
            alert('配置已保存，只会存在你自己的浏览器里');
        });

        // 生成笔记
        generateBtn.addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            generateBtn.disabled = true;

            const lessonName = lessonNameInput.value.trim();
            const lessonUrl = lessonUrlInput.value.trim();
            const username = config.username;
            const token = config.token;

            if (!lessonName) {
                errorMsg.textContent = '请输入课文名称';
                errorMsg.style.display = 'block';
                generateBtn.disabled = false;
                return;
            }

            if (!username || !token) {
                errorMsg.textContent = '请先配置你的GitHub信息';
                errorMsg.style.display = 'block';
                generateBtn.disabled = false;
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${REPO_NAME}/actions/workflows/crawl.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: {
                            lesson_name: lessonName,
                            lesson_url: lessonUrl
                        }
                    })
                });

                if (response.ok) {
                    successMsg.style.display = 'block';
                } else {
                    const error = await response.json();
                    errorMsg.textContent = '触发失败，请检查你的GitHub配置是否正确。';
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = '出错了：' + e.message;
                errorMsg.style.display = 'block';
            }

            generateBtn.disabled = false;
        });
    </script>
</body>
</html>
