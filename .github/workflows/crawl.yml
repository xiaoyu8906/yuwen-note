name: 生成笔记
run-name: 生成 ${{ inputs.lesson_name }} 的笔记

on:
  workflow_dispatch:
    inputs:
      lesson_name:
        description: '课文名称'
        required: true
        type: string
      lesson_url:
        description: '课文链接（可选）'
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫和AI生成
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python crawler.py ${{ inputs.lesson_name }} ${{ inputs.lesson_url }}

      - name: 提交并推送新笔记
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Add note: ${{ inputs.lesson_name }}'
          file_pattern: 'data/*.md'
