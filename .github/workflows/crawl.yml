name: 语文笔记爬虫

on:
  workflow_dispatch:
    inputs:
      lesson_name:
        description: '课文名称'
        required: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行爬虫 + AI 生成
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python crawl.py "${{ github.event.inputs.lesson_name }}"

      - name: 提交生成的笔记
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "自动生成笔记：${{ github.event.inputs.lesson_name }}"
          git push
