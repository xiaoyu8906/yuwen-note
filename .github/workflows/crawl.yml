name: 生成笔记
run-name: 生成 ${{ inputs.lesson_name }} 的笔记

on:
  workflow_dispatch:
    inputs:
      lesson_name:
        description: '课文名'
        required: true
        type: string
      lesson_url:
        description: '课文链接（可选）'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行爬虫和AI生成
        env:
          # 你的OpenRouter的Key
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LESSON_NAME: ${{ inputs.lesson_name }}
          LESSON_URL: ${{ inputs.lesson_url }}
        run: |
          # 把用户输入的链接也传给脚本，支持手动输入
          python crawler.py $LESSON_NAME $LESSON_URL

      - name: 提交并推送新笔记
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name: "GitHub Action"
          git add data/
          git commit -m "爬取:${{ inputs.lesson_name }}" || echo "没有新文件需要提交"
          git push
